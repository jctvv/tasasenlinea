name: Sincronizar datos desde Google Sheets

on:
  schedule:
    # Ejecutar cada hora (puedes ajustar la frecuencia)
    - cron: '*/30 * * * *'
  workflow_dispatch:  # Permite ejecutarlo manualmente

jobs:
  actualizar:
    runs-on: ubuntu-latest
    steps:
      - name: Clonar repositorio
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Instalar dependencias
        run: pip install requests pandas

      - name: Descargar y procesar CSV
        run: |
          python descargar_datos.py

      - name: Commit y push si hay cambios
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"
          git add datos.csv
          git diff --quiet && git diff --staged --quiet || git commit -m "Actualizar datos desde Google Sheets"
          git push
